<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORPG Table - 로비</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Shippori+Mincho:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="lobby-body">

  <!-- 배경 장식 -->
  <div class="bg-decoration">
    <div class="bg-grid"></div>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
  </div>

  <div id="app">
    <section id="auth-section" class="auth-card">
      <div class="auth-brand">
        <div class="brand-mark">🎲</div>
        <h1 class="brand-title">
          <span class="jp">卓上</span>
          <span class="en">ORPG TABLE</span>
        </h1>
        <p class="brand-tagline">オンラインTRPGセッション</p>
      </div>

      <div class="auth-body">
        <p class="subtitle">친구들과 온라인으로 TRPG를 즐겨보세요</p>
        <button id="btn-google-login" class="btn btn-primary btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.264h2.908c1.702-1.567 2.684-3.874 2.684-6.621z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          Google 계정으로 로그인
        </button>
      </div>
    </section>

    <section id="lobby-section" class="hidden">
      <header class="lobby-header">
        <div class="lobby-brand">
          <span class="brand-mark-sm">🎲</span>
          <h2>ORPG 로비</h2>
        </div>
        <div class="user-info">
          <img id="user-avatar" class="avatar" alt="" />
          <span id="user-display-name"></span>
          <button id="btn-logout" class="btn btn-ghost btn-small">로그아웃</button>
        </div>
      </header>

      <div class="lobby-actions">
        <button id="btn-create-room" class="btn btn-primary">
          <span class="btn-icon">＋</span> 새 방 만들기
        </button>
        <div class="join-room">
          <input type="text" id="join-room-id" placeholder="방 코드 (예: ABC123)" />
          <button id="btn-join-room" class="btn btn-secondary">입장</button>
        </div>
      </div>

      <h3 class="section-heading">참여 중인 세션</h3>
      <ul id="my-rooms-list" class="room-list">
        <li class="empty">아직 참여한 방이 없습니다.</li>
      </ul>
    </section>
  </div>

  <div id="create-room-modal" class="modal hidden">
    <div class="modal-content">
      <h3>새 방 만들기</h3>
      <label>방 이름
        <input type="text" id="new-room-name" maxlength="40" placeholder="예: 크툴루 원샷" />
      </label>
      <label>시스템
        <select id="new-room-system">
          <option value="generic">범용</option>
          <option value="coc7" selected>크툴루의 부름 7판</option>
        </select>
      </label>
      <div class="modal-actions">
        <button id="btn-create-cancel" class="btn btn-secondary">취소</button>
        <button id="btn-create-confirm" class="btn btn-primary">만들기</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/lobby.js"></script>
</body>
</html>
